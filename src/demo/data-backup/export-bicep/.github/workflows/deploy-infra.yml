# Generated by Azure Infrastructure Prompt Kit
name: Deploy Infrastructure (Bicep)

on:
  push:
    branches: [main, staging, develop]
    paths:
      - 'export-bicep/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [dev, staging, prod]

permissions:
  id-token: write
  contents: read

env:
  LOCATION: westeurope

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Bicep Lint
        run: az bicep build --file export-bicep/main.bicep

      - name: Run What-If (dev)
        run: |
          az deployment sub what-if \
            --location ${{ env.LOCATION }} \
            --template-file export-bicep/main.bicep \
            --parameters export-bicep/parameters/main.dev.bicepparam

  deploy-dev:
    name: Deploy to Dev
    needs: validate
    if: github.ref == 'refs/heads/develop' || github.event.inputs.environment == 'dev'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy
        run: |
          az deployment sub create \
            --location ${{ env.LOCATION }} \
            --template-file export-bicep/main.bicep \
            --parameters export-bicep/parameters/main.dev.bicepparam

  deploy-staging:
    name: Deploy to Staging
    needs: validate
    if: github.ref == 'refs/heads/staging' || github.event.inputs.environment == 'staging'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy
        run: |
          az deployment sub create \
            --location ${{ env.LOCATION }} \
            --template-file export-bicep/main.bicep \
            --parameters export-bicep/parameters/main.staging.bicepparam

  deploy-prod:
    name: Deploy to Production
    needs: [validate, deploy-staging]
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'prod'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy
        run: |
          az deployment sub create \
            --location ${{ env.LOCATION }} \
            --template-file export-bicep/main.bicep \
            --parameters export-bicep/parameters/main.prod.bicepparam
